<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Plataforma Farmtell</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonte Inter para um visual limpo e moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons para ícones -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        farmtell: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            900: '#064e3b', // Verde escuro para o sidebar
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Esconder scrollbar no menu */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-gray-50 h-screen overflow-hidden flex flex-col md:flex-row text-gray-800">

    <!-- Overlay escuro para mobile (quando menu está aberto) -->
    <div id="mobile-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-20 hidden md:hidden transition-opacity" onclick="toggleMobileMenu()"></div>

    <aside id="sidebar" class="bg-farmtell-900 text-white w-64 flex-shrink-0 fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30 flex flex-col shadow-xl">
        
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 border-b border-gray-700/50 bg-farmtell-900 z-10">
            <i class="ph ph-leaf text-2xl text-farmtell-500 mr-3"></i>
            <span class="text-xl font-bold tracking-tight">Farmtell<span class="text-farmtell-500 font-light">Hub</span></span>
            <!-- Botão fechar (Apenas mobile) -->
            <button class="md:hidden ml-auto text-gray-400 hover:text-white" onclick="toggleMobileMenu()">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>

        <!-- Links de Navegação (Apontando para os arquivos reais) -->
        <nav class="flex-1 overflow-y-auto no-scrollbar py-6 px-3 space-y-2">
            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Módulos</p>
            
            <!-- Link: Gestão de Confinamento (index.html) -->
            <!-- Dica: Adicione as classes "text-white bg-farmtell-600 shadow-md" no link correspondente à página atual para destacá-lo -->
            <a href="index.html" class="flex items-center px-3 py-2.5 rounded-lg text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="ph ph-chart-line-up text-xl mr-3"></i>
                <span class="font-medium text-sm">Gestão de Confinamento</span>
            </a>

            <!-- Link: Transferência de A granel (transferencia.html) -->
            <a href="transferencia.html" class="flex items-center px-3 py-2.5 rounded-lg text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="ph ph-truck text-xl mr-3"></i>
                <span class="font-medium text-sm">Transferência a Granel</span>
            </a>

            <!-- Link: Rastreabilidade Manual (manualmente.html) -->
           
             <a href="manualmente.html" class="flex items-center px-3 py-2.5 rounded-lg text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="ph ph-map-pin-line text-xl mr-3"></i>
                <span class="font-medium text-sm">Rastreabilidade</span>
            </a>
            <!-- Link controle de estoque/insumos -->
             <a href="estoque.html" class="flex items-center px-3 py-2.5 rounded-lg text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="ph ph-map-pin-line text-xl mr-3"></i>
                <span class="font-medium text-sm">Controle de Insumos</span>
            </a>
            <div class="my-4 border-t border-gray-700/50"></div>
            
            <!-- Link Extra: Configurações -->
            <a href="#" class="flex items-center px-3 py-2.5 rounded-lg text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="ph ph-gear text-xl mr-3"></i>
                <span class="font-medium text-sm">Configurações</span>
            </a>
        </nav>

        <!-- Perfil Usuário -->
        <div class="p-4 border-t border-gray-700/50 bg-black/10">
            <div class="flex items-center">
                <img src="https://placehold.co/40x40/22c55e/ffffff?text=U" alt="Usuário" class="w-9 h-9 rounded-full mr-3 border border-gray-600">
                <div>
                    <p class="text-sm font-medium">Usuário Gestor</p>
                    <p class="text-xs text-gray-400">Fazenda Boa Vista</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen w-full relative">
        
        <!-- Cabeçalho (Topbar) -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-8 shadow-sm flex-shrink-0">
            <div class="flex items-center">
                <!-- Botão Hambúrguer (Mobile) -->
                <button onclick="toggleMobileMenu()" class="md:hidden mr-4 text-gray-500 hover:text-gray-700 focus:outline-none p-2 rounded-md hover:bg-gray-100">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                
                <!-- Título da Página (Você pode alterar em cada arquivo HTML) -->
                <h1 class="text-xl font-semibold text-gray-800">Menu Principal</h1>
            </div>

            <!-- Ações do Cabeçalho -->
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                    <i class="ph ph-bell text-xl"></i>
                </button>
            </div>
        </header>

        <!-- Área de Conteúdo (Vazia, conforme solicitado) -->
        <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 bg-gray-50">
            
            <!-- Aqui vai o conteúdo real de cada interface -->
            <div class="max-w-7xl mx-auto flex flex-col items-center justify-center h-full text-center py-20">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 max-w-md w-full">
                    <i class="ph ph-squares-four text-5xl text-farmtell-500 mb-4 inline-block"></i>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Plataforma Farmtell</h2>
                    <p class="text-gray-500">Selecione um dos módulos no menu lateral para iniciar a gestão.</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Função exclusiva para controle do Menu Hamburger no Mobile
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            const isClosed = sidebar.classList.contains('-translate-x-full');
            
            if (isClosed) {
                // Abrir
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                // Fechar
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // Setup inicial (Garante que o resize da janela trate as classes corretamente)
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            } else {
                if(document.getElementById('mobile-overlay').classList.contains('hidden')){
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                }
            }
        });
    </script>
</body>
</html>

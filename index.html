        // Firebase Config
        const firebaseConfig = {

        const FirebaseService = {
            // Fazer login com Google
            signInWithGoogle: async () => {
                try {
                    document.getElementById('auth-loading').classList.remove('hidden');
                    document.getElementById('auth-error').classList.add('hidden');
                    const result = await signInWithPopup(auth, provider);
                    currentUser = result.user;
                    return result.user;
                } catch (error) {
                    console.error('Erro ao fazer login:', error);
                    document.getElementById('auth-error').textContent = 'Erro ao fazer login: ' + error.message;
                    document.getElementById('auth-error').classList.remove('hidden');
                    throw error;
                } finally {
                    document.getElementById('auth-loading').classList.add('hidden');
                }
            },

            // Fazer logout
            signOut: async () => {
                try {
                    await signOut(auth);
                    currentUser = null;
                    App.handleLogout();
                } catch (error) {
                    console.error('Erro ao fazer logout:', error);
                }
            },

            // Salvar dados no Firestore
            saveData: async (dataType, data, localidade) => {
                if (!currentUser) {
                    console.error('Usuário não autenticado');
                    return;
                }
                try {
                    const docRef = doc(db, `gestao_confinamento/${currentUser.uid}/dados/${dataType}_${localidade}_${Date.now()}`);
                    await setDoc(docRef, {
                        tipo: dataType,
                        localidade: localidade,
                        dados: data,
                        dataSalvo: new Date(),
                        usuario: currentUser.email
                    });
                    return true;
                } catch (error) {
                    console.error('Erro ao salvar dados:', error);
                    return false;
                }
            },

            // Carregar dados do Firestore
            loadData: async (dataType) => {
                if (!currentUser) {
                    console.error('Usuário não autenticado');
                    return [];
                }
                try {
                    const q = query(collection(db, `gestao_confinamento/${currentUser.uid}/dados`), 
                                    where("tipo", "==", dataType));
                    const querySnapshot = await getDocs(q);
                    const results = [];
                    querySnapshot.forEach((doc) => {
                        results.push(doc.data());
                    });
                    return results;
                } catch (error) {
                    console.error('Erro ao carregar dados:', error);
                    return [];
                }
            },

            loadLatestData: async (dataType) => {
                if (!currentUser) {
                    console.error('Usuário não autenticado');
                    return null;
                }
                try {
                    const q = query(collection(db, `gestao_confinamento/${currentUser.uid}/dados`),
                                    where("tipo", "==", dataType));
                    const querySnapshot = await getDocs(q);
                    if (querySnapshot.empty) return null;
                    const latestDoc = querySnapshot.docs.reduce((latest, current) => {
                        const currentData = current.data();
                        const latestData = latest.data();
                        const currentTime = currentData.dataSalvo && typeof currentData.dataSalvo.toMillis === 'function'
                            ? currentData.dataSalvo.toMillis()
                            : new Date(currentData.dataSalvo).getTime();
                        const latestTime = latestData.dataSalvo && typeof latestData.dataSalvo.toMillis === 'function'
                            ? latestData.dataSalvo.toMillis()
                            : new Date(latestData.dataSalvo).getTime();
                        return currentTime > latestTime ? current : latest;
                    }, querySnapshot.docs[0]);
                    return latestDoc.data();
                } catch (error) {
                    console.error('Erro ao carregar o último dado:', error);
                    return null;
                }
            },

            subscribeToLatestData: (dataType, callback) => {
                if (!currentUser) {
                    console.error('Usuário não autenticado');
                    return () => {};
                }
                try {
                    const q = query(collection(db, `gestao_confinamento/${currentUser.uid}/dados`),
                                    where("tipo", "==", dataType));
                    return onSnapshot(q, (snapshot) => {
                        if (!snapshot.empty) {
                            const latestDoc = snapshot.docs.reduce((latest, current) => {
                                const currentData = current.data();
                                const latestData = latest.data();
                                const currentTime = currentData.dataSalvo && typeof currentData.dataSalvo.toMillis === 'function'
                                    ? currentData.dataSalvo.toMillis()
                                    : new Date(currentData.dataSalvo).getTime();
                                const latestTime = latestData.dataSalvo && typeof latestData.dataSalvo.toMillis === 'function'
                                    ? latestData.dataSalvo.toMillis()
                                    : new Date(latestData.dataSalvo).getTime();
                                return currentTime > latestTime ? current : latest;
                            }, snapshot.docs[0]);
                            callback(latestDoc.data());
                        }
                    }, (error) => {
                        console.error('Erro no listener do Firestore:', error);
                    });
                } catch (error) {
                    console.error('Erro ao criar listener do Firestore:', error);
                    return () => {};
                }
            }
        };

        // Setup Auth UI
        onAuthStateChanged(auth, (user) => {
            if (user) {

                document.getElementById('auth-modal').classList.add('hidden');
                document.body.style.overflow = 'auto';
                App.setupFirestoreSync();
            } else {
                currentUser = null;
                document.getElementById('auth-modal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                App.stopFirestoreSync();

        document.getElementById('google-login-btn')?.addEventListener('click', FirebaseService.signInWithGoogle);

        // ==========================================

        const MOCK_DISTRIBUICAO = `Localidade\tData\tHora\tTrato\tTratador\tVagão\tCurral\tDieta\tPlano Alimentar (%)\tLote\tDistribuído (kg)\tPrevisto (kg)\tDesvio (kg)\tDesvio (%)\tStatus

CRISTO REI\t16/06/2026\t10:15:00\tTrato 1\tMARCOS LIMA\t90817 - CASALE 270\t150.2\tCONF. PASTO S\t100\tCRESC 2026-101\t1200\t1000\t200\t20,00%\tAMARELO
SANTA MARIA\t17/06/2026\t11:00:22\tTrato 2\tPAULO HENRIQUE\t90818 - CASALE 270\t151.3\tTERMINAÇÃO 1 2026\t100\tTERM 2026-055\t1500\t1000\t500\t50,00%\tVERMELHO`;

        const MOCK_OCORRENCIAS = `Localidade\tData Ocorrência\tTitulo\tOcorrência
CRISTO REI\t15 - 16 - 17/06/2026\tDOIS TRATORES QUEBRADOS\tDois tratotes quebraram, impactando a rotina de trato do confinamento. Parte dos tratos precisou ser realizado via fichas manuais. Responsáveis pelas informações: Matheus da Silva e Marimarcio.

HELIO TORO\t15/06/2026\tDISTRIBUIÇÃO SEM LOTE VINCULADO\tMódulos 149.1 // 152.1 // 152.4 na automação da linha Helio Toro correspondiam fisicamente aos módulos 154.2 // 163.3 // 163.4 da localidade Santa Maria. Como a operação iniciou o processo antes do PCA terminar de realizar as movimentações desses módulos, o trato foi distribuído sem vinculo, dessa forma sendo necessário excluir os dados e lançar manualmente novamente para que constasse 100% de aderência ao trato 1. Responsáveis pelas informações: Op. Paulo Henrique; Letícia Nunes; Leonardo Dias.`;

        const MOCK_ESTOQUE = `Localidade\tProduto\tDescrição\tEstoque Atual (kg)\tConsumo Diário Real (kg)\tConsumo Diário Projetado (kg)
CRISTO REI\t27\tSILAGEM DE BRACHIARIA\t10583128,00\t31068,00\t34648,00
CRISTO REI\t120794\tDDG OURO\t0,00\t48784,00\t56868,00
CRISTO REI\t5\tMILHETO EM GRAOS\t157192,00\t13574,00\t12040,00
CRISTO REI\t111357\tNUCLEO MINERAL IMPACTO PRO BAG\t15877,00\t516,00\t1367,00
CRISTO REI\t112844\tNUCLEO MINERAL RUMITECH BEEF 2025\t38581,00\t1284,00\t1166,00
CRISTO REI\t121004\tDDG S\t635059,00\t51263,00\t44755,00`;

        // ==========================================
        // 2. ESTADO GLOBAL DA APLICAÇÃO
        // ==========================================
        const App = {
            state: {
                activeTab: 'dashboard',
                activeView: 'carregamento',
                
                raw: {
                    carregamento: MOCK_CARREGAMENTO,
                    distribuicao: MOCK_DISTRIBUICAO,
                    ocorrencias: MOCK_OCORRENCIAS,
                    estoque: MOCK_ESTOQUE
                },
                
                parsed: {
                    carregamento: [],
                    distribuicao: [],
                    ocorrencias: [],
                    estoque: []
                },
                
                error: '',
                salvo: false,
                
                estoqueAvulsoData: [
                    { categoria: '', codigo: '61038', descricao: 'MILHO EM GRAOS ADQUIRIDO TERCEIROS', quantidade: 677373 },
                    { categoria: '', codigo: '14', descricao: 'SILAGEM DE MILHETO', quantidade: 9622970 },
                    { categoria: '', codigo: '121997', descricao: 'RACAO FORMULADA TROPA AGROCERES 2026', quantidade: 6000 },
                    { categoria: '', codigo: '3261', descricao: 'UREIA AGRICOLA', quantidade: 5930 },
                    { categoria: '', codigo: '62563', descricao: 'SAL BRANCO CIMSAL', quantidade: 37221 },
                    { categoria: '', codigo: '62174', descricao: 'MINERAL NOVANIS EQUINOS', quantidade: 150 },
                    { categoria: '', codigo: '123778', descricao: 'RACAO FORMULADA MINERAL UREADO 2026', quantidade: 0 },
                    { categoria: 'DDG OURO', codigo: '123781', descricao: 'RACAO FORMULADA PROTEICO ENERGETICO RECRIA BIG BAG 2026', quantidade: 10000 },
                    { categoria: 'DDG S', codigo: '124618', descricao: 'RACAO FORMULADA PROTEINADO RECRIA BIG BAG 2026', quantidade: 5000 },
                    { categoria: 'ETIQUETA AMARELA', codigo: '122818', descricao: 'RACAO FORMULADA PROTEINADO 2026 _V3 - ÚNICA', quantidade: 2000 },
                    { categoria: '', codigo: '124618', descricao: 'RACAO FORMULADA PROTEINADO RECRIA BIG BAG 2026 - ÚNICA', quantidade: 5000 },
                ],
                
                pcaProjections: [
                    { ingrediente: 'DDG OURO', volume: 56868 },
                    { ingrediente: 'DDG S', volume: 44755 },
                    { ingrediente: 'IMPACTO', volume: 1367 },
                    { ingrediente: 'MILHETO', volume: 12040 },
                    { ingrediente: 'RUMITECH', volume: 1166 },
                    { ingrediente: 'SILAGEM BRACHIARIA', volume: 34648 },
                ],
                
                attachments: {},
                
                filters: { data: 'Todas', localidade: 'Todas', dieta: 'Todas', ingrediente: 'Todos' }
            },
            
            derived: {},
            firestoreUnsubscribe: {},

            // ==========================================
            // 3. MÉTODOS UTILITÁRIOS E DE NEGÓCIO
            // ==========================================
            utils: {
                parseNumberBR: (str) => {
                    if (str === null || str === undefined || str === '') return 0;
                    let value = str.toString().trim().replace('%', '');

                    const hasDot = value.indexOf('.') !== -1;
                    const hasComma = value.indexOf(',') !== -1;

                    if (hasDot && hasComma) {
                        // Ex: 1.234,56 ou 12.345.678,90
                        value = value.replace(/\./g, '').replace(',', '.');
                    } else if (hasComma) {
                        // Ex: 1.307 ou 1,307
                        value = value.replace(/,/g, '.');
                    } else if (hasDot) {
                        // Se houver apenas ponto e houver exatamente 3 dígitos após ele,
                        // pode ser decimal em algumas entradas (1.307) ou milhares (10.841).
                        // Nesse caso, mantemos o ponto e deixamos o parseFloat decidir.
                        // Se for separador de milhares, ainda assim o valor ficará incorreto,
                        // mas a maioria das importações atualizadas será tratada corretamente.
                        value = value;
                    }

                    const num = parseFloat(value);
                    return isNaN(num) ? 0 : num;
                },
                getISOWeekAndYear: (dateStr) => {
                    const parts = dateStr.split('/');
                    if(parts.length !== 3) return 'sem. 00';
                    const date = new Date(parts[2], parts[1] - 1, parts[0]);
                    date.setHours(0, 0, 0, 0);
                    date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
                    const week1 = new Date(date.getFullYear(), 0, 4);
                    const week = 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
                    return `sem. ${week}`;
                },
                extractResponsavelFromOcorrencia: (textoCompleto) => {
                    if (!textoCompleto || typeof textoCompleto !== 'string') {
                        return { descricao: '', responsavel: 'Não identificado', responsaveis: [] };
                    }

                    const regex = /(Respons[áa]vel(?:s)?\s+pelas?|Respons[áa]vel(?:s)?\s+pela?)\s+informa[cç][õo]es?:?\s*/i;
                    const match = textoCompleto.match(regex);
                    let descricao = textoCompleto.trim();
                    let responsavel = 'Não identificado';
                    let responsaveis = [];

                    if (match) {
                        const parts = textoCompleto.split(match[0]);
                        descricao = (parts[0] || '').trim();
                        const rawResponsavel = (parts[1] || '').trim().replace(/[\.]$/g, '').trim();
                        if (rawResponsavel.length > 0) {
                            responsavel = rawResponsavel;
                            responsaveis = rawResponsavel.split(/\s*(?:;|,|\band\b|\be\b)\s*/i)
                                .map(name => name.trim())
                                .filter(name => name.length > 0);
                        }
                    }

                    if (!descricao && responsavel !== 'Não identificado') {
                        descricao = textoCompleto;
                    }

                    return { descricao, responsavel, responsaveis };
                }
            },

            init: function() {
                this.processData(MOCK_CARREGAMENTO, 'carregamento');
                this.processData(MOCK_DISTRIBUICAO, 'distribuicao');
                this.processData(MOCK_OCORRENCIAS, 'ocorrencias');
                this.processData(MOCK_ESTOQUE, 'estoque');
                this.render();
            },

            setupFirestoreSync: function() {
                if (!currentUser) return;
                const types = ['carregamento', 'distribuicao', 'ocorrencias', 'estoque'];
                types.forEach((type) => {
                    if (App.firestoreUnsubscribe[type]) {
                        App.firestoreUnsubscribe[type]();
                    }
                    App.firestoreUnsubscribe[type] = FirebaseService.subscribeToLatestData(type, (latest) => {
                        if (!latest || !latest.dados) return;
                        App.state.raw[type] = latest.dados;
                        if (type === 'carregamento' && App.state.activeView === 'tendencia') {
                            App.processData(latest.dados, 'carregamento');
                        } else if (App.state.activeView === type) {
                            App.processData(latest.dados, type);
                        } else {
                            App.render();
                        }
                    });
                });
            },

            stopFirestoreSync: function() {
                Object.values(App.firestoreUnsubscribe).forEach((unsubscribe) => {
                    if (typeof unsubscribe === 'function') unsubscribe();
                });
                App.firestoreUnsubscribe = {};
            },

            processData: function(text, type) {
                try {
                    const lines = text.trim().split('\n');
                    if (lines.length < 2) {
                        this.state.error = 'Por favor, insira o cabeçalho e pelo menos uma linha de dados.';
                        this.render();
                        return;
                    }

                    const headers = lines[0].split('\t').map(h => h.trim());
                    const data = [];
                    
                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split('\t');
                        if (values.length > 1) {
                            let row = {};
                            row._id = `row-${type}-${i}-${Math.random().toString(36).substr(2, 9)}`;

                            headers.forEach((header, index) => {
                                row[header] = values[index] ? values[index].trim() : '';
                            });
                            
                            if (type === 'ocorrencias') {
                                row.Localidade = (row.Localidade || '').trim();
                                row.Data = (row['Data Ocorrência'] || '').trim();
                                row.Titulo = (row.Titulo || '').trim();
                                row._ocorrencia = (row['Ocorrência'] || '').trim();
                                const extracted = App.utils.extractResponsavelFromOcorrencia(row._ocorrencia);
                                row._descricao = extracted.descricao;
                                row._responsavel = extracted.responsavel;
                                row._responsaveis = extracted.responsaveis;
                            } else if (type === 'estoque') {
                                row._estoque = this.utils.parseNumberBR(row['Estoque Atual (kg)']);
                                row._consumoReal = this.utils.parseNumberBR(row['Consumo Diário Real (kg)']);
                                row._consumoProj = this.utils.parseNumberBR(row['Consumo Diário Projetado (kg)']);
                                
                                row.Produto = row['Produto'];
                                row.Descrição = row['Descrição'];
                                row.Ingrediente = row['Descrição'];
                                
                                row._autonomiaReal = row._consumoReal > 0 ? Math.floor(row._estoque / row._consumoReal) : 0;
                                row._autonomiaProj = row._consumoProj > 0 ? Math.floor(row._estoque / row._consumoProj) : 0;
                            } else {
                                row._previsto = this.utils.parseNumberBR(row['Previsto (kg)']);
                                row._desvioKg = this.utils.parseNumberBR(row['Desvio (kg)']);
                                row._desvioPerc = this.utils.parseNumberBR(row['Desvio (%)']);
                                
                                if (type === 'carregamento') {
                                    row._realizado = this.utils.parseNumberBR(row['Carregado (kg)']);
                                } else {
                                    row._realizado = this.utils.parseNumberBR(row['Distribuído (kg)']);
                                }
                            }
                            data.push(row);
                        }
                    }
                    
                    this.state.parsed[type] = data;
                    this.state.error = '';
                    this.render();
                } catch (err) {
                    this.state.error = 'Erro ao processar os dados.';
                    console.error(err);
                    this.render();
                }
            },

            calculateDerived: function() {
                // 1. Tendência Derivada do Carregamento
                let derivedTendencia = [];
                const parsedCarregamento = this.state.parsed.carregamento;
                if (parsedCarregamento && parsedCarregamento.length > 0) {
                    const grouped = {};
                    const uniqueDaysPerWeek = {};

                    parsedCarregamento.forEach(row => {
                        if (!row.Data || !row.Ingrediente) return;
                        const week = this.utils.getISOWeekAndYear(row.Data);
                        
                        let code = '';
                        let name = row.Ingrediente;
                        const parts = row.Ingrediente.split('-');
                        if (parts.length > 1) {
                            const possibleCode = parts[parts.length - 1].trim();
                            const possibleCode2 = parts[0].trim();
                            if (!isNaN(possibleCode) && possibleCode.length > 0) {
                                code = possibleCode;
                                name = parts.slice(0, parts.length - 1).join('-').trim();
                            } else if (!isNaN(possibleCode2) && possibleCode2.length > 0) {
                                code = possibleCode2;
                                name = parts.slice(1).join('-').trim();
                            }
                        }
                        
                        const key = name.toUpperCase();
                        const loc = row.Localidade || 'Geral';

                        if (!grouped[key]) {
                            grouped[key] = { Produto: code, Descrição: name.toUpperCase(), Localidade: loc, semanasSum: {}, originalNames: new Set() };
                        }
                        if (!grouped[key].semanasSum[week]) grouped[key].semanasSum[week] = 0;
                        
                        grouped[key].semanasSum[week] += (row._realizado || 0);
                        grouped[key].originalNames.add(row.Ingrediente);
                        
                        if (!uniqueDaysPerWeek[week]) uniqueDaysPerWeek[week] = new Set();
                        uniqueDaysPerWeek[week].add(row.Data);
                    });

                    derivedTendencia = Object.values(grouped).map(item => {
                        const result = {
                            Localidade: item.Localidade, Produto: item.Produto, Descrição: item.Descrição,
                            Ingrediente: Array.from(item.originalNames)[0], semanas: {}
                        };
                        Object.keys(item.semanasSum).forEach(week => {
                            const totalKg = item.semanasSum[week];
                            const globalDaysCount = uniqueDaysPerWeek[week].size;
                            result.semanas[week] = globalDaysCount > 0 ? Math.round(totalKg / globalDaysCount) : 0;
                        });
                        return result;
                    });
                }

                const view = this.state.activeView;
                const rawCurrentData = 
                    view === 'carregamento' ? this.state.parsed.carregamento : 
                    view === 'distribuicao' ? this.state.parsed.distribuicao : 
                    view === 'estoque' ? this.state.parsed.estoque : 
                    view === 'tendencia' ? derivedTendencia : 
                    this.state.parsed.ocorrencias;

                // Opções de Filtro
                const filterOptions = { datas: [], localidades: [], dietas: [], ingredientes: [] };
                if (rawCurrentData && rawCurrentData.length > 0) {
                    filterOptions.datas = ['Todas', ...Array.from(new Set(rawCurrentData.map(d => d.Data))).filter(Boolean).sort()];
                    filterOptions.localidades = ['Todas', ...Array.from(new Set(rawCurrentData.map(d => d.Localidade))).filter(Boolean).sort()];
                    filterOptions.dietas = ['Todas', ...Array.from(new Set(rawCurrentData.map(d => d.Dieta))).filter(Boolean).sort()];
                    filterOptions.ingredientes = ['Todos', ...Array.from(new Set(rawCurrentData.map(d => d.Ingrediente))).filter(Boolean).sort()];
                }

                // Filtrar Dados
                const f = this.state.filters;
                const filteredData = rawCurrentData.filter(row => {
                    const matchData = f.data === 'Todas' || row.Data === f.data;
                    const matchLoc = f.localidade === 'Todas' || row.Localidade === f.localidade;
                    if (view === 'ocorrencias') return matchData && matchLoc;
                    if (view === 'estoque' || view === 'tendencia') {
                        return f.ingrediente === 'Todos' || row.Ingrediente === f.ingrediente;
                    }
                    const matchDieta = f.dieta === 'Todas' || row.Dieta === f.dieta;
                    const matchIng = f.ingrediente === 'Todos' || row.Ingrediente === f.ingrediente;
                    return matchData && matchLoc && matchDieta && matchIng;
                });

                // Stats Carregamento / Distribuição
                let stats = null;
                if (view === 'carregamento' || view === 'distribuicao') {
                    const tipoOperador = view === 'carregamento' ? 'Pazeiro' : 'Tratador';
                    const tolerance = view === 'carregamento' ? 2 : 20;
                    const tipoItem = view === 'carregamento' ? 'Ingrediente' : 'Dieta';
                    
                    if (filteredData.length > 0) {
                        let totalPrevisto = 0, totalRealizado = 0, totalDesvioAbsoluto = 0;
                        const statusCount = { VERDE: 0, AMARELO: 0, VERMELHO: 0, PRETO: 0 };
                        const operadores = {}, itens = {};

                        filteredData.forEach(row => {
                            totalPrevisto += row._previsto;
                            totalRealizado += row._realizado;
                            totalDesvioAbsoluto += Math.abs(row._desvioKg);
                            const status = row.Status ? row.Status.toUpperCase() : 'DESCONHECIDO';
                            if (statusCount[status] !== undefined) statusCount[status]++;

                            const opNome = row[tipoOperador] || 'Não Identificado';
                            if (!operadores[opNome]) operadores[opNome] = { nome: opNome, operacoes: 0, desvioAbsolutoKg: 0, previstoKg: 0 };
                            operadores[opNome].operacoes++;
                            operadores[opNome].desvioAbsolutoKg += Math.abs(row._desvioKg);
                            operadores[opNome].previstoKg += row._previsto;

                            const itemNome = row[tipoItem] || 'Não Identificado';
                            if (!itens[itemNome]) itens[itemNome] = { nome: itemNome, previstoKg: 0, realizadoKg: 0 };
                            itens[itemNome].previstoKg += row._previsto;
                            itens[itemNome].realizadoKg += row._realizado;
                        });

                        const rankingOperadores = Object.values(operadores).map(op => ({
                            ...op, erroMedioPerc: op.previstoKg > 0 ? (op.desvioAbsolutoKg / op.previstoKg) * 100 : 0
                        })).sort((a, b) => b.erroMedioPerc - a.erroMedioPerc);

                        const analiseItens = Object.values(itens).map(i => {
                            const diferencaKg = i.realizadoKg - i.previstoKg;
                            return { ...i, diferencaKg, diferencaPerc: i.previstoKg > 0 ? (diferencaKg / i.previstoKg) * 100 : 0 };
                        }).sort((a, b) => Math.abs(b.diferencaPerc) - Math.abs(a.diferencaPerc));

                        stats = {
                            totalPrevisto, totalRealizado, totalDesvioAbsoluto, 
                            desvioGeralPerc: totalPrevisto > 0 ? (totalDesvioAbsoluto / totalPrevisto) * 100 : 0,
                            statusCount, rankingOperadores, analiseItens, 
                            totalDiferencaLiquida: totalRealizado - totalPrevisto,
                            totalDiferencaLiquidaPerc: totalPrevisto > 0 ? ((totalRealizado - totalPrevisto) / totalPrevisto) * 100 : 0,
                            totalRegistros: filteredData.length, tolerance, tipoOperador, tipoItem
                        };
                    }
                }

                // Stats Ocorrencias
                let statsOcorrencias = null;
                if (view === 'ocorrencias' && filteredData.length > 0) {
                    const locais = {};
                    filteredData.forEach(row => { locais[row.Localidade] = (locais[row.Localidade] || 0) + 1; });
                    const topLocal = Object.keys(locais).reduce((a, b) => locais[a] > locais[b] ? a : b, Object.keys(locais)[0]);
                    statsOcorrencias = { total: filteredData.length, locais, topLocal, maxLocalOcorrencias: locais[topLocal] };
                }

                // Stats Estoque
                let statsEstoque = null;
                if (view === 'estoque' && filteredData.length > 0) {
                    let totalEstoque = 0, totalConsumoReal = 0, totalConsumoProj = 0;
                    const pca = this.state.pcaProjections;

                    const itens = filteredData.map(row => {
                        const desc = row.Descrição.toUpperCase();
                        let pcaVol = null;
                        if (desc.includes('DDG OURO')) pcaVol = pca.find(p => p.ingrediente === 'DDG OURO')?.volume;
                        else if (desc.includes('DDG S')) pcaVol = pca.find(p => p.ingrediente === 'DDG S')?.volume;
                        else if (desc.includes('IMPACTO')) pcaVol = pca.find(p => p.ingrediente === 'IMPACTO')?.volume;
                        else if (desc.includes('MILHETO')) pcaVol = pca.find(p => p.ingrediente === 'MILHETO')?.volume;
                        else if (desc.includes('RUMITECH')) pcaVol = pca.find(p => p.ingrediente === 'RUMITECH')?.volume;
                        else if (desc.includes('SILAGEM')) pcaVol = pca.find(p => p.ingrediente === 'SILAGEM BRACHIARIA')?.volume;

                        const consumoProjAtualizado = pcaVol !== null && pcaVol !== undefined ? pcaVol : row._consumoProj;
                        const autonomiaProjAtualizada = consumoProjAtualizado > 0 ? Math.floor(row._estoque / consumoProjAtualizado) : 0;

                        totalEstoque += row._estoque;
                        totalConsumoReal += row._consumoReal;
                        totalConsumoProj += consumoProjAtualizado;

                        return { ...row, _consumoProj: consumoProjAtualizado, _autonomiaProj: autonomiaProjAtualizada };
                    }).sort((a, b) => a._autonomiaReal - b._autonomiaReal);

                    statsEstoque = { 
                        totalEstoque, totalConsumoReal, totalConsumoProj, 
                        autonomiaGeralReal: totalConsumoReal > 0 ? Math.floor(totalEstoque / totalConsumoReal) : 0,
                        autonomiaGeralProj: totalConsumoProj > 0 ? Math.floor(totalEstoque / totalConsumoProj) : 0,
                        itens, totalRegistros: filteredData.length 
                    };
                }

                // Stats Tendencia
                let statsTendencia = null;
                if (view === 'tendencia' && filteredData.length > 0) {
                    const semanas = Object.keys(filteredData[0].semanas || {}).sort((a,b) => {
                        const numA = parseInt(a.replace(/\D/g, '')) || 0;
                        const numB = parseInt(b.replace(/\D/g, '')) || 0;
                        return numA - numB;
                    });
                    
                    const maxWeekNum = semanas.length > 0 ? parseInt(semanas[semanas.length - 1].replace(/\D/g, '')) || 24 : 24;
                    const pca = this.state.pcaProjections;
                    
                    const itens = filteredData.map(row => {
                        const desc = row.Descrição ? row.Descrição.toUpperCase() : '';
                        let pcaVol = null;
                        if (desc.includes('DDG OURO')) pcaVol = pca.find(p => p.ingrediente === 'DDG OURO')?.volume;
                        else if (desc.includes('DDG S')) pcaVol = pca.find(p => p.ingrediente === 'DDG S')?.volume;
                        else if (desc.includes('IMPACTO')) pcaVol = pca.find(p => p.ingrediente === 'IMPACTO')?.volume;
                        else if (desc.includes('MILHETO')) pcaVol = pca.find(p => p.ingrediente === 'MILHETO')?.volume;
                        else if (desc.includes('RUMITECH')) pcaVol = pca.find(p => p.ingrediente === 'RUMITECH')?.volume;
                        else if (desc.includes('SILAGEM')) pcaVol = pca.find(p => p.ingrediente === 'SILAGEM BRACHIARIA')?.volume;
                        return { ...row, _pcaProjecao: pcaVol };
                    });

                    statsTendencia = { semanas, proj1: `sem. ${maxWeekNum + 1}`, proj2: `sem. ${maxWeekNum + 2}`, itens, totalRegistros: filteredData.length };
                }

                this.derived = { filterOptions, filteredData, stats, statsOcorrencias, statsEstoque, statsTendencia, derivedTendencia };
            },

            // ==========================================
            // 4. AÇÕES E EVENTOS (Actions)
            // ==========================================
            actions: {
                setActiveTab: (tab) => { App.state.activeTab = tab; App.render(); },
                setActiveView: (view) => { 
                    App.state.activeView = view; 
                    App.state.filters = { data: 'Todas', localidade: 'Todas', dieta: 'Todas', ingrediente: 'Todos' };
                    App.render(); 
                },
                setFilter: (key, val) => { App.state.filters[key] = val; App.render(); },
                updateRawData: (val) => {
                    const view = App.state.activeView;
                    if(view === 'carregamento' || view === 'tendencia') App.state.raw.carregamento = val;
                    else if(view === 'distribuicao') App.state.raw.distribuicao = val;
                    else if(view === 'estoque') App.state.raw.estoque = val;
                    else App.state.raw.ocorrencias = val;
                },
                processRawData: () => {
                    const view = App.state.activeView;
                    const raw = App.state.raw[view === 'tendencia' ? 'carregamento' : view];
                    App.processData(raw, view === 'tendencia' ? 'carregamento' : view);
                },
                saveDataToFirestore: async () => {
                    if (!currentUser) {
                        alert('Faça login primeiro para salvar dados');
                        return;
                    }
                    const view = App.state.activeView === 'tendencia' ? 'carregamento' : App.state.activeView;
                    const raw = App.state.raw[view];
                    if (!raw || raw.length === 0) {
                        alert('Nenhum dado para salvar');
                        return;
                    }
                    try {
                        const success = await FirebaseService.saveData(view, raw, 'General');
                        if (success) {
                            alert('✅ Dados salvos com sucesso no Firestore!');
                            await App.actions.loadDataFromFirestore();
                        } else {
                            alert('❌ Erro ao salvar dados');
                        }
                    } catch (error) {
                        alert('Erro: ' + error.message);
                    }
                },
                loadDataFromFirestore: async () => {
                    if (!currentUser) {
                        alert('Faça login primeiro para carregar dados');
                        return;
                    }
                    const view = App.state.activeView === 'tendencia' ? 'carregamento' : App.state.activeView;
                    try {
                        const latestData = await FirebaseService.loadLatestData(view);
                        if (latestData && latestData.dados) {
                            App.actions.updateRawData(latestData.dados);
                            App.processData(latestData.dados, view);
                            App.render();
                            alert('✅ Dados carregados com sucesso!');
                        } else {
                            alert('Nenhum dado encontrado para este tipo');
                        }
                    } catch (error) {
                        alert('Erro: ' + error.message);
                    }
                },
                handleAttachMedia: (id, files) => {
                    if (!files || files.length === 0) return;
                    const newMedia = Array.from(files).map(file => ({
                        type: file.type.startsWith('video/') ? 'video' : 'image',
                        url: URL.createObjectURL(file), name: file.name
                    }));
                    if(!App.state.attachments[id]) App.state.attachments[id] = [];
                    App.state.attachments[id] = [...App.state.attachments[id], ...newMedia];
                    App.render();
                },
                removeMedia: (id, indexToRemove) => {
                    if(App.state.attachments[id]) {
                        App.state.attachments[id] = App.state.attachments[id].filter((_, idx) => idx !== indexToRemove);
                        App.render();
                    }
                },
                updatePCA: (idx, val) => { App.state.pcaProjections[idx].volume = Number(val); App.render(); },
                updateEstoqueAvulso: (idx, val) => { App.state.estoqueAvulsoData[idx].quantidade = Number(val); }, // Sem re-render pra não perder foco
                saveEstoqueAvulso: () => { 
                    App.state.salvo = true; App.render(); 
                    setTimeout(() => { App.state.salvo = false; App.render(); }, 3000); 
                },
                updateEstoqueField: (rowId, field, val) => {
                    // Encontrar o registro na parsed.estoque e atualizar valores
                    const parsed = App.state.parsed.estoque || [];
                    const idx = parsed.findIndex(r => r._id === rowId);
                    if (idx === -1) return;
                    const row = parsed[idx];
                    const num = Number(String(val).replace(',', '.')) || 0;
                    if (field === '_estoque') row._estoque = num;
                    if (field === '_consumoReal') row._consumoReal = num;
                    if (field === '_consumoProj') row._consumoProj = num;
                    // Recalcular autonomias
                    row._autonomiaReal = row._consumoReal > 0 ? Math.floor(row._estoque / row._consumoReal) : 0;
                    row._autonomiaProj = row._consumoProj > 0 ? Math.floor(row._estoque / row._consumoProj) : 0;
                    App.state.parsed.estoque[idx] = row;
                    // Re-renderizar
                    App.calculateDerived();
                    App.render();
                },
                handleLogout: () => {
                    App.state.activeTab = 'dashboard';
                    App.state.activeView = 'carregamento';
                    App.render();
                }
            },

            // ==========================================
            // 5. FUNÇÕES DE CRIAÇÃO DE GRÁFICOS (SVG)
            // ==========================================
            renderTrendChart: function() {
                const data = this.derived.statsTendencia.itens;
                const semanas = this.derived.statsTendencia.semanas;
                if (!data || data.length === 0 || !semanas || semanas.length === 0) return `<div class="h-64 flex items-center justify-center text-gray-400">Nenhum dado encontrado.</div>`;
                
                const chartData = data.slice(0, 5); 
                const width = 900, height = 350, margin = { top: 30, right: 30, bottom: 50, left: 60 };
                const chartW = width - margin.left - margin.right;
                const chartH = height - margin.top - margin.bottom;

                let maxY = 1;
                chartData.forEach(d => {
                    if (d._pcaProjecao && d._pcaProjecao > maxY) maxY = d._pcaProjecao;
                    semanas.forEach(s => { if (d.semanas[s] > maxY) maxY = d.semanas[s]; });
                });
                maxY = maxY * 1.15; 

                const getX = (i) => margin.left + (i * (chartW / Math.max(semanas.length - 1, 1)));
                const getY = (val) => margin.top + chartH - ((val / maxY) * chartH);
                const colors = ['#2563eb', '#ea580c', '#16a34a', '#9333ea', '#dc2626'];

                let svgContent = `
                    <line x1="${margin.left}" y1="${margin.top+chartH}" x2="${width-margin.right}" y2="${margin.top+chartH}" stroke="#cbd5e1" stroke-width="2" />
                    <line x1="${margin.left}" y1="${margin.top}" x2="${width-margin.right}" y2="${margin.top}" stroke="#e2e8f0" stroke-dasharray="4" />
                    <text x="${margin.left - 10}" y="${margin.top + 5}" font-size="10" fill="#64748b" text-anchor="end">${Math.round(maxY).toLocaleString('pt-BR')} kg</text>
                    <text x="${margin.left - 10}" y="${margin.top + chartH}" font-size="10" fill="#64748b" text-anchor="end">0 kg</text>
                `;

                semanas.forEach((sem, i) => {
                    svgContent += `<text x="${getX(i)}" y="${margin.top + chartH + 20}" font-size="11" fill="#475569" text-anchor="middle" font-weight="bold">${sem.toUpperCase()}</text>`;
                });

                chartData.forEach((d, dIdx) => {
                    const color = colors[dIdx % colors.length];
                    const points = semanas.map((sem, i) => `${getX(i)},${getY(d.semanas[sem] || 0)}`).join(' ');
                    const pcaY = d._pcaProjecao ? getY(d._pcaProjecao) : null;
                    
                    if (pcaY) svgContent += `<line x1="${margin.left}" y1="${pcaY}" x2="${width-margin.right}" y2="${pcaY}" stroke="${color}" stroke-width="2" stroke-dasharray="6,6" opacity="0.5" />`;
                    svgContent += `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />`;
                    
                    semanas.forEach((sem, i) => {
                        svgContent += `
                            <circle cx="${getX(i)}" cy="${getY(d.semanas[sem] || 0)}" r="5" fill="white" stroke="${color}" stroke-width="2.5" />
                            <text x="${getX(i)}" y="${getY(d.semanas[sem] || 0) - 10}" font-size="10" fill="${color}" text-anchor="middle" font-weight="bold">${(d.semanas[sem] || 0).toLocaleString('pt-BR')}</text>
                        `;
                    });
                });

                const legendHtml = chartData.map((d, dIdx) => `
                    <div class="flex items-center">
                        <div class="w-3 h-3 mr-2 rounded-full" style="background-color: ${colors[dIdx % colors.length]}"></div>
                        ${d.Descrição.substring(0, 20)} (Real)
                    </div>
                `).join('') + `
                    <div class="flex items-center ml-4 text-gray-500">
                        <div class="w-6 h-0 border-t-2 border-dashed border-gray-400 mr-2"></div>Projeção PCA (Meta)
                    </div>
                `;

                return `
                    <div class="w-full overflow-x-auto">
                        <svg viewBox="0 0 ${width} ${height}" class="w-full min-w-[750px] h-auto font-sans">${svgContent}</svg>
                        <div class="flex flex-wrap justify-center gap-6 mt-4 text-xs font-bold text-gray-700">${legendHtml}</div>
                    </div>
                `;
            },

            renderComboChart: function() {
                const stats = this.derived.stats;
                if (!stats || !stats.analiseItens || stats.analiseItens.length === 0) return `<div class="h-64 flex items-center justify-center text-gray-400">Nenhum dado encontrado.</div>`;
                
                const chartData = [...stats.analiseItens].sort((a, b) => b.previstoKg - a.previstoKg).slice(0, 10).map(d => ({
                    label: d.nome.split('-')[0].trim(), prev: d.previstoKg / 1000, real: d.realizadoKg / 1000, perc: Math.abs(d.diferencaPerc)
                }));
                const width = 900, height = 350, margin = { top: 50, right: 30, bottom: 60, left: 30 };
                const chartW = width - margin.left - margin.right, chartH = height - margin.top - margin.bottom;
                const maxTon = Math.max(...chartData.map(d => Math.max(d.prev, d.real))) * 1.15 || 1;
                const maxPerc = Math.max(...chartData.map(d => d.perc)) * 1.25 || 1;
                const getX = (i) => margin.left + (i * (chartW / chartData.length)) + (chartW / chartData.length / 2);
                const getYTon = (val) => margin.top + chartH - ((val / maxTon) * chartH);
                const getYPerc = (val) => margin.top + chartH - ((val / maxPerc) * chartH);
                const baseLineY = margin.top + chartH;
                const barW = Math.min((chartW / chartData.length) * 0.35, 32);
                const linePoints = chartData.map((d, i) => `${getX(i)},${getYPerc(d.perc)}`).join(' ');

                let svgContent = `
                    <line x1="${margin.left - 20}" y1="${baseLineY}" x2="${width - margin.right + 20}" y2="${baseLineY}" stroke="#cbd5e1" stroke-width="1" />
                    <polyline points="${linePoints}" fill="none" stroke="#d97706" stroke-width="2.5" />
                `;

                chartData.forEach((d, i) => {
                    const xC = getX(i), xP = xC - barW - 1.5, xR = xC + 1.5;
                    const yP = getYTon(d.prev), hP = baseLineY - yP, yR = getYTon(d.real), hR = baseLineY - yR, yPerc = getYPerc(d.perc);
                    const labelStr = d.label.length > 18 ? d.label.substring(0, 18) + '...' : d.label;
                    
                    svgContent += `
                        <rect x="${xP}" y="${yP}" width="${barW}" height="${hP}" fill="#1e3a8a" />
                        <rect x="${xR}" y="${yR}" width="${barW}" height="${hR}" fill="#c2410c" />
                        <text x="${xC}" y="${baseLineY + 20}" font-size="11" fill="#475569" text-anchor="middle" font-weight="bold">${labelStr}</text>
                    `;
                    if(hP > 40) svgContent += `<text x="${xP + barW / 2 + 4}" y="${baseLineY - 8}" font-size="10" fill="white" text-anchor="start" font-weight="bold" transform="rotate(-90 ${xP + barW / 2 + 4} ${baseLineY - 8})">${d.prev.toFixed(1)}</text>`;
                    if(hR > 40) svgContent += `<text x="${xR + barW / 2 + 4}" y="${baseLineY - 8}" font-size="10" fill="white" text-anchor="start" font-weight="bold" transform="rotate(-90 ${xR + barW / 2 + 4} ${baseLineY - 8})">${d.real.toFixed(1)}</text>`;

                        <g transform="translate(${xC - 22}, ${yPerc - 26})">

                            <text x="22" y="13" font-size="10" fill="#15803d" text-anchor="middle" font-weight="bold">${d.perc.toFixed(2)}%</text>
                        </g>
                    `;
                });

                return `
                    <div class="w-full overflow-x-auto">
                        <svg viewBox="0 0 ${width} ${height}" class="w-full min-w-[750px] h-auto font-sans">${svgContent}</svg>
                        <div class="flex justify-center space-x-10 mt-2 pb-4 text-xs font-bold text-gray-700">

            renderAutonomyChart: function() {
                const data = this.derived.statsEstoque?.itens;
                if (!data || data.length === 0) return `<div class="h-64 flex items-center justify-center text-gray-400">Nenhum dado encontrado.</div>`;
                
                const chartData = [...data].slice(0, 12).map(d => ({
                    label: d.Descrição.split(' ')[0] + (d.Descrição.split(' ').length > 1 ? ' ' + d.Descrição.split(' ')[1] : ''),
                    farmtellDays: d._autonomiaReal, projDays: d._autonomiaProj
                }));

                const width = 900, height = 300, margin = { top: 30, right: 30, bottom: 60, left: 40 };
                const chartW = width - margin.left - margin.right, chartH = height - margin.top - margin.bottom;
                const maxDays = Math.min(Math.max(...chartData.map(d => Math.max(d.farmtellDays, d.projDays))) * 1.15 || 1, 365);
                
                const getX = (i) => margin.left + (i * (chartW / chartData.length)) + (chartW / chartData.length / 2);
                const getY = (val) => margin.top + chartH - ((Math.min(val, maxDays) / maxDays) * chartH);
                const baseLineY = margin.top + chartH;
                const barW = Math.min((chartW / chartData.length) * 0.35, 28);

                let svgContent = `
                    <line x1="${margin.left}" y1="${baseLineY}" x2="${width - margin.right}" y2="${baseLineY}" stroke="#cbd5e1" stroke-width="2" />
                    <line x1="${margin.left}" y1="${margin.top}" x2="${width - margin.right}" y2="${margin.top}" stroke="#e2e8f0" stroke-dasharray="4" />
                    <text x="${margin.left - 5}" y="${margin.top + 5}" font-size="10" fill="#64748b" text-anchor="end">${Math.round(maxDays)} d</text>
                    <text x="${margin.left - 5}" y="${baseLineY}" font-size="10" fill="#64748b" text-anchor="end">0 d</text>
                `;

                chartData.forEach((d, i) => {
                    const xC = getX(i), xF = xC - barW - 1, xP = xC + 1;
                    const yF = getY(d.farmtellDays), hF = baseLineY - yF, yP = getY(d.projDays), hP = baseLineY - yP;
                    const labelStr = d.label.length > 15 ? d.label.substring(0, 15) + '...' : d.label;

                    svgContent += `
                        <rect x="${xF}" y="${yF}" width="${barW}" height="${hF}" fill="#475569" rx="2" ry="2" />
                        <rect x="${xP}" y="${yP}" width="${barW}" height="${hP}" fill="#86efac" rx="2" ry="2" />
                        <text x="${xF + barW/2}" y="${yF - 5}" font-size="10" fill="#334155" text-anchor="middle" font-weight="bold">${d.farmtellDays}</text>
                        <text x="${xP + barW/2}" y="${yP - 5}" font-size="10" fill="#166534" text-anchor="middle" font-weight="bold">${d.projDays}</text>
                        <text x="${xC}" y="${baseLineY + 20}" font-size="10" fill="#475569" text-anchor="middle" font-weight="bold">${labelStr}</text>
                    `;
                });

                return `
                    <div class="w-full overflow-x-auto">
                        <svg viewBox="0 0 ${width} ${height}" class="w-full min-w-[750px] h-auto font-sans">${svgContent}</svg>
                        <div class="flex justify-center space-x-10 mt-2 text-xs font-bold text-gray-700">
                            <div class="flex items-center"><div class="w-4 h-4 bg-[#475569] mr-2 rounded-sm"></div>AUTONOMIA FARMTELL (DIAS)</div>
                            <div class="flex items-center"><div class="w-4 h-4 bg-[#86efac] mr-2 rounded-sm"></div>AUTONOMIA PROJEÇÃO (DIAS)</div>
                        </div>
                    </div>
                `;
            },

                        </div>
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center">

                            <div class="space-y-4">
                                ${['VERDE', 'AMARELO', 'VERMELHO', 'PRETO'].map(s => `

                if (v === 'ocorrencias') {
                    thHtml = `<tr><th class="px-4 py-3">Data</th><th class="px-4 py-3">Localidade</th><th class="px-4 py-3">Título</th><th class="px-4 py-3 min-w-[300px]">Descrição Separada</th><th class="px-4 py-3">Responsáveis Capturados</th></tr>`;
                    tbodyHtml = data.map(r => `<tr class="border-b hover:bg-gray-50 transition-colors"><td class="px-4 py-3 font-medium">${r.Data}</td><td class="px-4 py-3 text-gray-600">${r.Localidade}</td><td class="px-4 py-3 font-bold text-gray-800">${r.Titulo}</td><td class="px-4 py-3 text-gray-600 whitespace-normal text-xs">${r._descricao}</td><td class="px-4 py-3 text-indigo-700 font-medium whitespace-normal text-xs">${r._responsavel}</td></tr>`).join('');
                } else if (v === 'estoque') {
                    thHtml = `<tr><th class="px-4 py-3">Localidade</th><th class="px-4 py-3">Produto</th><th class="px-4 py-3">Descrição</th><th class="px-4 py-3 text-right">Estoque (kg)</th><th class="px-4 py-3 text-right">Consumo Real/Dia</th><th class="px-4 py-3 text-right">Consumo Proj/Dia</th></tr>`;
                    tbodyHtml = data.map(r => `<tr class="border-b hover:bg-gray-50 transition-colors"><td class="px-4 py-3 text-gray-600">${r.Localidade}</td><td class="px-4 py-3 text-gray-600">${r.Produto}</td><td class="px-4 py-3 font-medium text-gray-800">${r.Descrição}</td><td class="px-4 py-3 text-right text-gray-500">${r._estoque.toLocaleString('pt-BR')}</td><td class="px-4 py-3 text-right text-gray-800">${r._consumoReal.toLocaleString('pt-BR')}</td><td class="px-4 py-3 text-right text-gray-800">${r._consumoProj.toLocaleString('pt-BR')}</td></tr>`).join('');
                } else if (v === 'tendencia') {
                    thHtml = `<tr><th class="px-4 py-3">Localidade</th><th class="px-4 py-3">Produto</th><th class="px-4 py-3">Descrição</th><th class="px-4 py-3">Semanas Encontradas</th></tr>`;
                    tbodyHtml = data.map(r => `<tr class="border-b hover:bg-gray-50 transition-colors"><td class="px-4 py-3 text-gray-600">${r.Localidade}</td><td class="px-4 py-3 text-gray-600">${r.Produto}</td><td class="px-4 py-3 font-medium text-gray-800">${r.Descrição}</td><td class="px-4 py-3 text-gray-600 text-xs">${Object.entries(r.semanas || {}).map(([s, val]) => `${s}: ${val} kg`).join(' | ')}</td></tr>`).join('');
                } else {
                    thHtml = `<tr>
                        <th class="px-4 py-3">Data/Hora</th>
                        <th class="px-4 py-3">${v === 'carregamento' ? 'Pazeiro' : 'Tratador'} / Vagão</th>
                        <th class="px-4 py-3">Localidade</th>
                        ${v === 'distribuicao' ? '<th class="px-4 py-3">Curral / Lote</th>' : ''}
                        <th class="px-4 py-3">Dieta</th>
                        <th class="px-4 py-3">${v === 'carregamento' ? 'Ingrediente' : 'Plano Alimentar'}</th>
                        <th class="px-4 py-3 text-right">Previsto</th>
                        <th class="px-4 py-3 text-right">Realizado</th>
                        <th class="px-4 py-3 text-center">Desvio</th>
                        <th class="px-4 py-3 text-center">Status</th>
                    </tr>`;
                    tbodyHtml = data.map(r => {
                        const sc = r.Status === 'VERDE' ? 'bg-green-100 text-green-800' : r.Status === 'AMARELO' ? 'bg-yellow-100 text-yellow-800' : r.Status === 'VERMELHO' ? 'bg-red-100 text-red-800' : r.Status === 'PRETO' ? 'bg-black text-white' : 'bg-gray-100 text-gray-800';
                        return `
                            <tr class="border-b hover:bg-gray-50 transition-colors">
                                <td class="px-4 py-3"><div class="font-medium">${r.Data}</div><div class="text-xs text-gray-500">${r.Hora}</div></td>
                                <td class="px-4 py-3"><div class="font-medium">${v === 'carregamento' ? r.Pazeiro : r.Tratador}</div><div class="text-xs text-gray-500 truncate max-w-[150px]" title="${r['Vagão']}">${r['Vagão']}</div></td>
                                <td class="px-4 py-3 text-gray-600">${r.Localidade}</td>
                                ${v === 'distribuicao' ? `<td class="px-4 py-3"><div class="font-medium">${r.Curral}</div><div class="text-xs text-gray-500">${r.Lote}</div></td>` : ''}
                                <td class="px-4 py-3 text-gray-600">${r.Dieta}</td>
                                <td class="px-4 py-3 font-medium text-gray-800">${v === 'carregamento' ? r.Ingrediente : `${r['Plano Alimentar (%)']}%`}</td>
                                <td class="px-4 py-3 text-right text-gray-500">${r['Previsto (kg)']} kg</td>
                                <td class="px-4 py-3 text-right font-medium">${v === 'carregamento' ? r['Carregado (kg)'] : r['Distribuído (kg)']} kg</td>
                                <td class="px-4 py-3 text-center"><span class="font-medium ${r._desvioKg > 0 ? 'text-blue-600' : r._desvioKg < 0 ? 'text-red-600' : 'text-gray-500'}">${r['Desvio (%)']}</span></td>
                                <td class="px-4 py-3 text-center"><span class="px-2.5 py-1 rounded-full text-xs font-bold ${sc}">${r.Status || '-'}</span></td>
                            </tr>`;
                    }).join('');
                }

                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                            <h3 class="text-lg font-semibold">Auditoria de Dados - ${v === 'carregamento' ? 'Carregamento' : v === 'distribuicao' ? 'Distribuição' : v === 'estoque' ? 'Estoque' : v === 'tendencia' ? 'Histórico Semanal' : 'Ocorrências'}</h3>
                            <span class="text-sm text-gray-500">${data.length} registros (Filtros Aplicados)</span>
                        </div>
                        <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                            <table class="min-w-full text-sm text-left whitespace-nowrap">
                                <thead class="text-xs text-gray-500 uppercase bg-gray-100 sticky top-0 z-10">${thHtml}</thead>
                                <tbody>${tbodyHtml}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            render: function() {
                const s = this.state;
                let mainContent = '';

                if (s.activeTab === 'import') {
                    mainContent = this.renderImport();
                } else if (s.activeTab === 'dashboard') {
                    mainContent = this.renderDashboard();
                } else if (s.activeTab === 'data') {
                    this.calculateDerived(); // Garante o sync
                    mainContent = this.renderRawData();
                }

                document.getElementById('app').innerHTML = `
                    ${this.renderNavigation()}
                    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        ${this.renderViewSelector()}
                        ${mainContent}
                    </main>
                `;
                
                // Atualizar email do usuário
                const userInfoEl = document.getElementById('user-info');
                if (userInfoEl && currentUser) {
                    userInfoEl.textContent = currentUser.email;
                }
                
                lucide.createIcons();
            }
        };

        // ==========================================
        // 7. INICIALIZAR A APLICAÇÃO
        // ==========================================
        // Tornar acessível a partir do escopo global para handlers inline
        window.App = App;
        window.FirebaseService = FirebaseService;

        window.onload = function() { App.init(); };

    </script>
</body>
</html>
